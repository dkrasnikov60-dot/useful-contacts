<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Полезные связи — импорт контактов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 32px;
            padding: 32px 24px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: all 0.3s ease;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 24px;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }
        button:active {
            transform: scale(0.98);
        }
        .tag-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 20px 0;
            justify-content: center;
        }
        .tag {
            padding: 8px 16px;
            border-radius: 30px;
            background: #f3f4f6;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .tag.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            display: none;
            font-size: 14px;
        }
        .status.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        .status.info {
            background: #dbeafe;
            color: #1e40af;
            display: block;
        }
        .status.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .fallback-form {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }
        .fallback-form input, .fallback-form textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .fallback-form input:focus, .fallback-form textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .fallback-title {
            text-align: center;
            color: #374151;
            margin-bottom: 12px;
            font-weight: 500;
        }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="card" id="app">
        <h1>📱 Полезные связи</h1>
        <p class="subtitle" id="subtitle">Загрузка...</p>

        <div id="mainContent" style="display: none;">
            <div class="tag-selector" id="tagSelector">
                <div class="tag selected" data-tag="Поставщики">📦 Поставщики</div>
                <div class="tag" data-tag="Клиенты">🤝 Клиенты</div>
                <div class="tag" data-tag="Друзья">👥 Друзья</div>
                <div class="tag" data-tag="Работа">💼 Работа</div>
                <div class="tag" data-tag="Семья">🏠 Семья</div>
            </div>

            <button id="importBtn">📖 Разрешить доступ и импортировать контакты</button>
            <div id="status" class="status"></div>

            <!-- Запасной вариант: ручной ввод -->
            <div id="fallbackForm" class="fallback-form">
                <div class="fallback-title">📝 Или добавьте вручную</div>
                <input type="text" id="manualName" placeholder="Имя">
                <input type="tel" id="manualPhone" placeholder="Телефон">
                <textarea id="manualInfo" placeholder="Доп. информация (необязательно)" rows="2"></textarea>
                <button id="manualSubmitBtn">💾 Сохранить контакт</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            let tg = null;
            let selectedTag = "Поставщики";
            let webAppReady = false;

            function showStatus(type, text) {
                const statusDiv = document.getElementById('status');
                statusDiv.className = `status ${type}`;
                statusDiv.textContent = text;
            }

            function showFallbackForm() {
                document.getElementById('fallbackForm').style.display = 'block';
            }

            function setImportButtonState({ visible = true, disabled = false, text = '📖 Разрешить доступ и импортировать контакты' } = {}) {
                const btn = document.getElementById('importBtn');
                btn.style.display = visible ? 'block' : 'none';
                btn.disabled = disabled;
                btn.innerHTML = text;
            }

            // Ждём загрузки Telegram WebApp SDK
            function waitForTelegram() {
                return new Promise((resolve) => {
                    if (typeof window.Telegram !== 'undefined' && window.Telegram.WebApp) {
                        resolve(window.Telegram.WebApp);
                        return;
                    }
                    let checkInterval = setInterval(() => {
                        if (typeof window.Telegram !== 'undefined' && window.Telegram.WebApp) {
                            clearInterval(checkInterval);
                            resolve(window.Telegram.WebApp);
                        }
                    }, 50);
                    setTimeout(() => {
                        clearInterval(checkInterval);
                        resolve(null);
                    }, 2000);
                });
            }

            // Инициализация
            async function init() {
                const subtitle = document.getElementById('subtitle');
                const mainContent = document.getElementById('mainContent');
                
                tg = await waitForTelegram();
                
                if (tg && tg.initData) {
                    // Внутри Telegram
                    tg.expand();
                    tg.ready();
                    webAppReady = true;
                    subtitle.textContent = 'Импорт контактов из телефона';
                    mainContent.style.display = 'block';

                    if (!navigator.contacts || !navigator.contacts.select) {
                        showStatus('info', 'Импорт контактов недоступен в текущем Telegram/WebView. Ниже можно добавить контакт вручную.');
                        showFallbackForm();
                        setImportButtonState({ visible: false });
                    }
                    
                    // Настройка кнопки назад
                    if (tg.BackButton) {
                        tg.BackButton.show();
                        tg.BackButton.onClick(() => tg.close());
                    }
                } else {
                    // Не в Telegram — показываем только ручной ввод
                    subtitle.textContent = 'Добавление контакта';
                    mainContent.style.display = 'block';
                    setImportButtonState({ visible: false });
                    showFallbackForm();
                    webAppReady = false;
                }
                
                // Настройка выбора тегов
                document.querySelectorAll('.tag').forEach(tag => {
                    tag.addEventListener('click', () => {
                        document.querySelectorAll('.tag').forEach(t => t.classList.remove('selected'));
                        tag.classList.add('selected');
                        selectedTag = tag.dataset.tag;
                    });
                });
                
                // Кнопка импорта
                const importBtn = document.getElementById('importBtn');
                importBtn.addEventListener('click', handleImport);
                
                // Ручное сохранение
                const manualSubmitBtn = document.getElementById('manualSubmitBtn');
                manualSubmitBtn.addEventListener('click', handleManualSubmit);
            }
            
            // Импорт контактов
            async function handleImport() {
                const statusDiv = document.getElementById('status');
                
                // Проверка поддержки API
                if (!navigator.contacts || !navigator.contacts.select) {
                    showStatus('error', '❌ Telegram Mini App не дал доступ к контактам устройства. Используйте ручной ввод ниже.');
                    showFallbackForm();
                    return;
                }
                
                setImportButtonState({ disabled: true, text: '<span class="loader"></span> Запрос доступа...' });
                showStatus('info', 'Запрашиваем доступ к контактам...');
                
                try {
                    const opts = { types: [{ type: 'contacts' }] };
                    const contacts = await navigator.contacts.select(['name', 'tel'], opts);
                    
                    if (!contacts || contacts.length === 0) {
                        showStatus('error', '❌ Контакты не выбраны или доступ запрещён');
                        showFallbackForm();
                        setImportButtonState();
                        return;
                    }
                    
                    showStatus('info', `📥 Импортируем ${contacts.length} контактов...`);
                    
                    const contactsData = [];
                    for (let contact of contacts) {
                        let name = contact.name?.[0] || 'Без имени';
                        let rawPhone = contact.tel?.[0] || '';
                        let phone = typeof rawPhone === 'string' ? rawPhone : (rawPhone?.value || '');
                        if (phone) {
                            contactsData.push({ name, phone });
                        }
                    }
                    
                    if (contactsData.length === 0) {
                        showStatus('error', '❌ Нет контактов с номерами телефонов');
                        showFallbackForm();
                        setImportButtonState();
                        return;
                    }
                    
                    if (webAppReady && tg) {
                        tg.sendData(JSON.stringify({
                            action: 'import_contacts',
                            tag: selectedTag,
                            contacts: contactsData
                        }));
                        tg.close();
                    } else {
                        showStatus('success', `✅ Импортировано ${contactsData.length} контактов в категорию "${selectedTag}" (тестовый режим)`);
                        setImportButtonState();
                    }
                    
                } catch (err) {
                    console.error('Import error:', err);
                    if (err.name === 'NotAllowedError') {
                        showStatus('error', '❌ Доступ к контактам запрещён. Разрешите в настройках браузера или используйте ручной ввод.');
                    } else if (err.name === 'NotSupportedError') {
                        showStatus('error', '❌ Ваш браузер не поддерживает импорт контактов. Используйте ручной ввод.');
                    } else {
                        showStatus('error', '❌ Ошибка: ' + err.message);
                    }
                    showFallbackForm();
                    setImportButtonState();
                }
            }
            
            // Ручное добавление
            function handleManualSubmit() {
                const name = document.getElementById('manualName').value.trim();
                const phone = document.getElementById('manualPhone').value.trim();
                const info = document.getElementById('manualInfo').value.trim();
                const statusDiv = document.getElementById('status');
                
                if (!phone) {
                    showStatus('error', '❌ Введите номер телефона');
                    return;
                }
                if (!name) {
                    showStatus('error', '❌ Введите имя');
                    return;
                }
                
                const data = {
                    phone: phone,
                    name: name,
                    info: info,
                    tag: selectedTag
                };
                
                if (webAppReady && tg) {
                    tg.sendData(JSON.stringify(data));
                    tg.close();
                } else {
                    showStatus('success', `✅ Контакт "${name}" готов к сохранению! (в Telegram режим не активен)`);
                    // Очищаем поля
                    document.getElementById('manualName').value = '';
                    document.getElementById('manualPhone').value = '';
                    document.getElementById('manualInfo').value = '';
                }
            }
            
            // Запуск
            init();
        })();
    </script>
</body>
</html>
